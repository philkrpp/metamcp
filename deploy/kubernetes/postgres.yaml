apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: metamcp-postgres-pvc
  namespace: ${METAMCP_NAMESPACE}
  labels:
    app.kubernetes.io/name: metamcp
    app.kubernetes.io/component: database
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ${METAMCP_STORAGE_CLASS}
  resources:
    requests:
      storage: ${METAMCP_POSTGRES_STORAGE}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metamcp-postgres
  namespace: ${METAMCP_NAMESPACE}
  labels:
    app.kubernetes.io/name: metamcp
    app.kubernetes.io/component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: metamcp
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metamcp
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: "${METAMCP_POSTGRES_DB}"
            - name: POSTGRES_USER
              value: "${METAMCP_POSTGRES_USER}"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metamcp-secret
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - ${METAMCP_POSTGRES_USER}
                - -d
                - ${METAMCP_POSTGRES_DB}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - ${METAMCP_POSTGRES_USER}
                - -d
                - ${METAMCP_POSTGRES_DB}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: ${METAMCP_POSTGRES_CPU_REQUEST}
              memory: ${METAMCP_POSTGRES_MEMORY_REQUEST}
            limits:
              cpu: ${METAMCP_POSTGRES_CPU_LIMIT}
              memory: ${METAMCP_POSTGRES_MEMORY_LIMIT}
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: metamcp-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: metamcp-postgres
  namespace: ${METAMCP_NAMESPACE}
  labels:
    app.kubernetes.io/name: metamcp
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    app.kubernetes.io/name: metamcp
    app.kubernetes.io/component: database
