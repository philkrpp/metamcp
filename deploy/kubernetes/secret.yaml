apiVersion: v1
kind: Secret
metadata:
  name: metamcp-secret
  namespace: ${METAMCP_NAMESPACE}
  labels:
    app.kubernetes.io/name: metamcp
    app.kubernetes.io/component: app
type: Opaque
stringData:
  postgres-password: "${METAMCP_POSTGRES_PASSWORD}"
  better-auth-secret: "${METAMCP_BETTER_AUTH_SECRET}"
  bootstrap-user-password: "${METAMCP_BOOTSTRAP_USER_PASSWORD}"
